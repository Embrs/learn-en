<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>每日英文・家庭生活</title>
<!-- %BASE_URL% 由 Vite 換成 vite.config.js 裡的 base（/learn-en/）。
     站台部署在子路徑底下，這些連結不能寫成 /manifest.json 這種根路徑。 -->
<link rel="manifest" href="%BASE_URL%manifest.json">
<link rel="icon" href="%BASE_URL%icons/favicon-32.png">
<link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png">
<meta name="theme-color" content="#1d4ed8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日英文">
</head>
<body>

<div id="app"></div>

<!-- 這份 index.html 同時也是 GitHub Pages 的 404.html（見 vite.config.js 的 spaFallbackPlugin），
     所有深層網址都會載入這裡，再由 vue-router 決定顯示哪一頁。 -->
<script type="module" src="/src/main.js"></script>
</body>
</html>
